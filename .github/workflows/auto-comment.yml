name: Auto Comment Bot 

permissions:
  issues: write
  pull-requests: write

on:
  issues:
    types: [opened, closed]
  pull_request:
    types: [opened, review_requested]
  pull_request_target:
    types: [closed]

jobs:
  get-bot-token:
    runs-on: ubuntu-latest
    outputs:
      token: ${{ steps.app-token.outputs.token }}
    steps:
      - name: Get AbaAbaAba-bot token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}
          installation_id: ${{ secrets.INSTALLATION_ID }}

  welcome-comment:
    runs-on: ubuntu-latest
    needs: get-bot-token
    if: ${{ github.event_name == 'issues' && github.event.action == 'opened' || github.event_name == 'pull_request' && github.event.action == 'opened' }}
    steps:
      - name: Auto Welcome Comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ needs.get-bot-token.outputs.token }}
          issue-number: ${{ github.event.issue.number || github.event.pull_request.number }}
          body: |
            Thanks for opening this issue/PR! 😊

            We really appreciate your contribution — your effort helps make the project better. ✨

            Feel free to add any additional details, screenshots, or context here to help us review your work smoothly.

  merged-comment:
    runs-on: ubuntu-latest
    needs: get-bot-token
    if: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.merged == true }}
    steps:
      - uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ needs.get-bot-token.outputs.token }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            PR merged successfully! Thank you for your contribution.

  closed-issue-comment:
    runs-on: ubuntu-latest
    needs: get-bot-token
    if: ${{ github.event_name == 'issues' && github.event.action == 'closed' }}
    steps:
      - name: Auto Closed Issue Comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ needs.get-bot-token.outputs.token }}
          issue-number: ${{ github.event.issue.number }}
          body: |
            This issue has been closed. Thanks for reporting it and helping us improve the project! 🙏

            If you think this was closed in error, feel free to reopen it with additional context.

  review-requested-comment:
    runs-on: ubuntu-latest
    needs: get-bot-token
    if: ${{ github.event_name == 'pull_request' && github.event.action == 'review_requested' }}
    steps:
      - name: Auto Review Requested Comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ needs.get-bot-token.outputs.token }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            A reviewer has been assigned to this PR — thanks for your patience while we review your work!