name: CLI Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  cli-test:
    name: CLI Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Test --help
        run: python -m _errortools.cli --help

      - name: Test --version (-v)
        run: python -m _errortools.cli --version

      - name: Test --info (-i)
        run: python -m _errortools.cli --info

      - name: Test --author (-a)
        run: python -m _errortools.cli --author

      - name: Test --email (-e)
        run: python -m _errortools.cli --email

      - name: Test --license (-l)
        run: python -m _errortools.cli --license

      - name: Test --url (-u)
        run: python -m _errortools.cli --url

      - name: Test --copyrights (-c)
        run: python -m _errortools.cli --copyrights

      - name: Test log subcommand (info, stdout)
        run: python -m _errortools.cli log "Hello from CI" --level info --output stdout

      - name: Test log subcommand (warning, stderr)
        run: python -m _errortools.cli log "Warning from CI" --level warning --output stderr

      - name: Test log subcommand (debug level)
        run: python -m _errortools.cli log "Debug message" --level debug --output stdout

      - name: Test log subcommand (error level)
        run: python -m _errortools.cli log "Error message" --level error --output stderr

      - name: Test log subcommand (critical level)
        run: python -m _errortools.cli log "Critical message" --level critical --output stderr

      - name: Test logger entry point (console script)
        run: logger log "Logger entry point test" --level info --output stdout

      - name: Verify --version output format
        run: |
          output=$(python -m _errortools.cli --version)
          echo "Version output: $output"
          echo "$output" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$'
