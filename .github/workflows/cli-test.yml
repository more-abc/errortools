name: CLI Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  cli-test:
    name: CLI Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Test --help
        run: python -m errortools --help

      - name: Test --version (-v)
        run: python -m errortools --version

      - name: Test --info (-i)
        run: python -m errortools --info

      - name: Test --author (-a)
        run: python -m errortools --author

      - name: Test --email (-e)
        run: python -m errortools --email

      - name: Test --license (-l)
        run: python -m errortools --license

      - name: Test --url (-u)
        run: python -m errortools --url

      - name: Test --copyrights (-c)
        run: python -m errortools --copyrights

      - name: Test log info, stdout
        run: logger --level info --output stdout "Hello from CI" 

      - name: Test log warning, stderr
        run: logger --level warning --output stderr "Warning from CI" 

      - name: Test log debug level
        run: logger --level debug --output stdout "Debug message" 

      - name: Test log error level
        run: logger --level error --output stderr "Error message"

      - name: Test log critical level
        run: logger --level critical --output stderr "Critical message" 

      - name: Test logger entry point (console script)
        run: logger --level info --output stdout "Logger entry point test" 

      - name: Verify --version output format
        run: |
          output=$(python -m errortools --version)
          echo "Version output: $output"
          echo "$output" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$'
