name: Lock Threads

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

concurrency:
  group: lock-threads
  cancel-in-progress: true

jobs:
  lock:
    runs-on: ubuntu-latest
    steps:
      - uses: dessant/lock-threads@v5
        with:
          github-token: ${{ github.token }}

          issue-inactive-days: 365
          pr-inactive-days: 30

          issue-exclude-labels: "help wanted, keep-open"
          pr-exclude-labels: "keep-open"

          add-issue-labels: old
          add-pr-labels: old

          issue-lock-comment: >
            This thread has been automatically locked since there has not been
            any recent activity after it was closed. Please open a new issue for
            related bugs.
          pr-lock-comment: >
            This PR has been automatically locked due to inactivity.
            Create a new PR if you need to revisit this change.

          lock-reason: resolved
