name: Block merge if certain labels exist

on:
  pull_request:
    types: [labeled, unlabeled, opened, synchronize, reopened]

permissions:
  pull-requests: read
  checks: write

jobs:
  check-merge-block:
    runs-on: ubuntu-latest
    steps:
      - name: Block merge if forbidden label is present
        uses: actions/github-script@v7
        with:
          script: |
            const forbiddenLabels = [
              "Needs triage",
              "DO-NOT-MERGE",
              "duplicate"
            ];

            const prLabels = context.payload.pull_request.labels.map(l => l.name);

            const hasForbidden = forbiddenLabels.some(fl => prLabels.includes(fl));

            if (hasForbidden) {
              core.setFailed("This PR has a blocking label and cannot be merged.");
            }