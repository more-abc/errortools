name: Python Check (pytest → mypy → flake8 → black)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov mypy flake8 black

      - name: Run pytest 
        run: pytest

      - name: Run mypy .
        run: mypy 

      - name: Run flake8
        run: flake8 .

      - name: Run black 
        run: black .
