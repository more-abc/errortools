name: Python Check (pytest → mypy → flake8 → black → autopep8)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov mypy flake8 black autopep8

      - name: Run pytest
        run: pytest

      - name: Run mypy
        run: mypy

      - name: Run black (format code)
        run: black .

      - name: Run autopep8 (auto fix)
        run: autopep8 . --recursive --in-place --pep8-passes 2000 --verbose

      - name: Run flake8
        run: flake8

      - name: Commit & push as AbaAbaAba-bot-like[bot]
        run: |
          git config --local user.name "AbaAbaAba-bot-like[bot]"
          git config --local user.email "bot@users.noreply.github.com"
          git add .
          git commit -am "[Bot]: auto format code (black + autopep8)" || exit 0
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }}