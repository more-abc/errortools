[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

log_cli = true
log_cli_level = INFO
log_format = %(asctime)s %(levelname)-8s %(message)s
log_date_format = %Y-%m-%d %H:%M:%S

addopts =
    -v
    --color=yes
    --cov=_errortools
    --cov-report=term
    --cov-report=html